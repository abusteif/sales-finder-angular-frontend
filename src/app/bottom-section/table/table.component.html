<p-table
  [value]="items"
  [tableStyle]="{ 'min-width': '50rem' }"
  size="small"
  [paginator]="true"
  [rows]="5"
>
  <ng-template #header>
    <tr>
      <th>Item</th>
      <th>Price</th>
      <th>Discount</th>
      <th>Date</th>
      <th>Category</th>
    </tr>
  </ng-template>
  <ng-template #body let-item>
    <tr>
      <td>
        <a href="https://www.google.com">{{ item.item }}</a>
    </td>
      <td>{{ item.price }}</td>
      <td>{{ item.discount }}</td>
      <td>{{ item.date | relativeDate }}</td>
      <td>{{ item.category }}</td>
    </tr>
  </ng-template>
</p-table>
