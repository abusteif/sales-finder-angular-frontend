<div class="ui dropdown selection">
  <input type="hidden" [name]="name">

  <div class="default text">{{name | titlecase}}</div>
  <i class="dropdown icon"></i>
  <div class="menu">
    <div class="item" (click)="selectItem(item)" *ngFor="let item of items; let i=index">{{item}}</div>

  </div>
</div>
